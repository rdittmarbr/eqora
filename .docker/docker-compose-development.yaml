name: eqora-development
services:
  admin:
    command:
      - sh
      - -lc
      - npm install && npm run dev -- --host 0.0.0.0 --port 3000
    container_name: eqora_development_admin
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: http://localhost:8000/api
    expose:
      - "3000"
    image: node:22-alpine
    networks:
      back_net: null
    ports:
      - mode: ingress
        target: 3000
        published: "8020"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /data/projetos/sistemas/eqora/app_admin
        target: /workspace/app_admin
        bind:
          create_host_path: true
    working_dir: /workspace/app_admin
  api:
    build:
      context: /data/projetos/sistemas/eqora
      dockerfile: docker/php/Dockerfile
      args:
        PHP_VERSION: "8.3"
    command:
      - sh
      - -lc
      - php artisan serve --host=0.0.0.0 --port=8080
    container_name: eqora_development_api
    depends_on:
      db:
        condition: service_healthy
        required: true
      redis:
        condition: service_healthy
        required: true
    environment:
      APP_DEBUG: "true"
      APP_ENV: development
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_DATABASE: eqora
      DB_HOST: db
      DB_PASSWORD: eqora
      DB_PORT: "5432"
      DB_USERNAME: eqora
      REDIS_HOST: redis
      REDIS_PASSWORD: eqora
      REDIS_PORT: "6379"
    expose:
      - "8080"
    networks:
      back_net: null
      db_net: null
    ports:
      - mode: ingress
        target: 8000
        published: "8080"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /data/projetos/sistemas/eqora/app_api
        target: /var/www/html
        bind:
          create_host_path: true
    working_dir: /var/www/html
  client:
    command:
      - sh
      - -lc
      - npm install && npm run dev -- --hostname 0.0.0.0 --port 3000
    container_name: eqora_development_client
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api
      NODE_ENV: development
    expose:
      - "3000"
    image: node:20-alpine
    networks:
      back_net: null
    ports:
      - mode: ingress
        target: 3000
        published: "8010"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /data/projetos/sistemas/eqora/app_client
        target: /workspace/app_client
        bind:
          create_host_path: true
    working_dir: /workspace/app_client
  db:
    container_name: eqora_development_db
    environment:
      POSTGRES_DB: eqora
      POSTGRES_PASSWORD: eqora
      POSTGRES_USER: eqora
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U eqora -d eqora
      timeout: 5s
      interval: 10s
      retries: 5
    image: postgres:16-alpine
    networks:
      back_net: null
      db_net: null
    ports:
      - mode: ingress
        target: 5432
        published: "5432"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /data/projetos/sistemas/eqora/.data/pg
        target: /var/lib/postgresql/data
        bind:
          create_host_path: true
  nginx:
    container_name: eqora_development_nginx
    depends_on:
      admin:
        condition: service_started
        required: true
      api:
        condition: service_started
        required: true
      client:
        condition: service_started
        required: true
    image: nginx:1.27-alpine
    networks:
      back_net: null
    ports:
      - mode: ingress
        target: 80
        published: "8000"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /data/projetos/sistemas/eqora/docker/nginx/default.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true
        bind:
          create_host_path: true
  redis:
    command:
      - redis-server
      - --requirepass
      - eqora
    container_name: eqora_development_redis
    healthcheck:
      test:
        - CMD
        - redis-cli
        - -a
        - eqora
        - PING
      timeout: 5s
      interval: 10s
      retries: 5
    image: redis:7-alpine
    networks:
      db_net: null
    ports:
      - mode: ingress
        target: 6379
        published: "6379"
        protocol: tcp
    restart: unless-stopped
  web_mobile:
    command:
      - sh
      - -lc
      - npm install && npx expo start --web --host 0.0.0.0 --port 19006
    container_name: eqora_development_web_mobile
    environment:
      EXPO_PUBLIC_SERVER_TYPE: development
      NODE_ENV: development
    expose:
      - "19006"
    image: node:20-alpine
    networks:
      back_net: null
    ports:
      - mode: ingress
        target: 19006
        published: "8102"
        protocol: tcp
    restart: unless-stopped
    volumes:
      - type: bind
        source: /data/projetos/sistemas/eqora/app_mobile
        target: /workspace/app_mobile
        bind:
          create_host_path: true
    working_dir: /workspace/app_mobile
networks:
  back_net:
    name: eqora-development_back_net
  db_net:
    name: eqora-development_db_net
