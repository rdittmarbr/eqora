# Proxy de borda para o proxy Docker do EQora
# Destino interno esperado: http://127.0.0.1:8000
#
# Publico (exemplo):
#   https://www.dittmar.com.br/sistemas/eqora/client
#   https://www.dittmar.com.br/sistemas/eqora/admin
#
# Este arquivo reescreve o prefixo /sistemas/eqora/* para os paths internos
# /client e /admin usados pelo proxy Docker.

upstream eqora_docker_proxy {
    server 127.0.0.1:8000;
    keepalive 32;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name www.dittmar.com.br;

    # Se este host for servido por HTTPS neste mesmo nginx de borda,
    # troque/duplique este bloco para listen 443 e certificados.

    # Opcional: raiz do sistema -> client
    location = /sistemas/eqora {
        return 301 /sistemas/eqora/client;
    }

    # Normalize path "client" com barra
    location = /sistemas/eqora/client {
        return 301 /sistemas/eqora/client/;
    }

    # Client (Next.js com basePath=/client)
    location ^~ /sistemas/eqora/client/ {
        rewrite ^/sistemas/eqora/client(/.*)?$ /client$1 break;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /sistemas/eqora/client;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_pass http://eqora_docker_proxy;

        # Reescreve redirects do proxy interno/Next para o path publico
        proxy_redirect ~^(/client(?:/.*)?)$ /sistemas/eqora$1;
    }

    # Admin (Vue/Vite servido no proxy interno em /admin)
    location = /sistemas/eqora/admin {
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /sistemas/eqora/admin;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        rewrite ^ /admin break;
        proxy_pass http://eqora_docker_proxy;

        proxy_redirect ~^(/admin(?:/.*)?)$ /sistemas/eqora$1;
    }

    location ^~ /sistemas/eqora/admin/ {
        rewrite ^/sistemas/eqora/admin(/.*)?$ /admin$1 break;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Prefix /sistemas/eqora/admin;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        proxy_pass http://eqora_docker_proxy;

        proxy_redirect ~^(/admin(?:/.*)?)$ /sistemas/eqora$1;
    }

    # Alias opcional se o path com ponto foi intencional:
    # /sistemas.eqora/admin -> /sistemas/eqora/admin
    location = /sistemas.eqora/admin {
        return 301 /sistemas/eqora/admin;
    }
    location ^~ /sistemas.eqora/admin/ {
        return 301 /sistemas/eqora/admin/;
    }

    # Opcional: API publica no mesmo prefixo
    # location ^~ /sistemas/eqora/api/ {
    #     rewrite ^/sistemas/eqora/api(/.*)?$ /api$1 break;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    #     proxy_pass http://eqora_docker_proxy;
    # }

    location / {
        return 404;
    }
}
