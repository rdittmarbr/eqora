services:
  nginx:
    image: nginx:1.27-alpine
    container_name: eqora_${SERVER_TYPE:-development}_nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - client
      - admin
    networks:
      - back_net
